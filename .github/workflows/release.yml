name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR with Maven
        run: mvn package -DskipTests

      - name: Find JAR file
        id: find_jar
        run: |
          JAR_FILE=$(find target -name "*-jar-with-dependencies.jar" | head -1)
          JAR_NAME=$(basename "$JAR_FILE")
          echo "JAR_FILE=$JAR_FILE" >> $GITHUB_OUTPUT
          echo "JAR_NAME=$JAR_NAME" >> $GITHUB_OUTPUT
          echo "Found: $JAR_FILE"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Access Context Fuzzer ${{ github.ref_name }}"
          body: |
            ## Access Context Fuzzer ${{ github.ref_name }}

            ### 📥 Installation
            1. Download **${{ steps.find_jar.outputs.JAR_NAME }}** below
            2. Open Burp Suite → Extensions → Add
            3. Select the downloaded JAR file
            4. The "Access Context" tab will appear in Burp Suite

            ### ✅ Requirements
            - Burp Suite Professional or Community Edition
            - Java 17+
          files: ${{ steps.find_jar.outputs.JAR_FILE }}
          draft: false
          prerelease: false
          generate_release_notes: true
